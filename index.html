<!--
このHTMLは assets/ と images/ フォルダ前提です。

assets に入れるファイル名:
- title.png
- select-title.png
- red.png
- blue.png
- yellow.png
- green.png
- purple.png
- gray.png
- voice-1.mp3
- voice-2.mp3
- voice-3.mp3
- title-bgm.mp3
- select-bgm.mp3
- play-bgm.mp3
- bg-mike.png
- bg-chatora.png
- bg-shiro.png
- bg-kuro.png
- bg-hachiware.png
- bg-saba.png
- bg-suko.png
- bg-ruu.png
- bg-shamu.png

images に入れる公式キャラ画像ファイル名:
- mike.webp
- chatora.webp
- shiro.webp
- kuro.webp
- hachiware.webp
- saba.webp
- suko.webp
- ruu.webp
- shamu.webp
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>消しネコ</title>
<style>
:root{--bg1:#fcf4f0;--bg2:#f2e0dd;--panel:#fff7f4;--panel2:#f4e6e2;--line:#f6b6c7;--line2:#d66f8e;--text:#6e4760;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:radial-gradient(circle at 50% 15%,#fff7f8 0,#f9ece8 42%,#efdfdc 100%);color:var(--text);font-family:Arial,"Hiragino Sans","Yu Gothic",sans-serif}
body{padding:10px 10px calc(18px + var(--safe))}
button,select{font:inherit}
.wrap{max-width:1120px;margin:0 auto}
h1{margin:0 0 8px;text-align:center;color:#f47a98;text-shadow:0 0 14px rgba(255,255,255,.8),2px 2px 0 #fff;font-size:clamp(28px,5vw,42px);letter-spacing:.04em}
.sub{margin:0 0 14px;text-align:center;color:#9b6f83;font-size:14px}
.frame{border:4px solid var(--line);border-radius:24px;padding:12px;background-image:linear-gradient(180deg,rgba(255,255,255,.88),rgba(255,255,255,.76)),var(--play-bg,url('assets/bg-mike.png'));background-size:auto,420px auto;background-repeat:no-repeat,repeat;background-position:center center,center center;box-shadow:0 0 0 5px rgba(255,255,255,.55) inset,0 18px 45px rgba(151,96,121,.18)}
.grid{display:grid;grid-template-columns:minmax(260px,1fr) 310px minmax(260px,1fr);gap:12px;align-items:start}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:3px solid var(--line);border-radius:18px;padding:8px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.7)}
.label{display:flex;justify-content:space-between;font-weight:900;margin-bottom:8px;color:#8f5572;text-shadow:1px 1px 0 #fff}
.board-wrap{position:relative}
canvas{width:100%;aspect-ratio:1/2;display:block;border:2px solid rgba(255,255,255,.88);border-radius:14px;background:linear-gradient(180deg,#fffaf8,#f3e7e3);touch-action:none}
.center{display:flex;flex-direction:column;gap:10px}
.box{background:rgba(255,255,255,.8);border:2px solid rgba(244,182,199,.8);border-radius:16px;padding:10px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.7)}
.title{font-size:25px;text-align:center;color:#ff82a0;text-shadow:2px 2px 0 #fff;font-weight:900}
.next{display:flex;justify-content:center;gap:18px;min-height:90px;align-items:center}
.pair{display:flex;flex-direction:column;gap:8px;align-items:center}
.token-img,.legend-icon{width:42px;height:42px;display:block;filter:drop-shadow(0 4px 6px rgba(141,90,109,.18))}
.legend{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px}
.legend-item{background:rgba(255,255,255,.86);padding:6px;border-radius:12px;text-align:center;font-size:11px;font-weight:700;color:#8a5a73}
.legend-icon{width:34px;height:34px;margin:0 auto 4px}
.smallnote{font-size:12px;color:#af758d;text-align:center;margin-top:4px}
.member-card{position:relative;overflow:hidden;border:3px solid #fff;border-radius:18px;min-height:400px;background:#f7ebe9;box-shadow:0 10px 24px rgba(151,96,121,.18),inset 0 0 0 1px rgba(255,255,255,.5)}
.member-art{position:absolute;inset:0;background:#f5e7e4}
.member-art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .22s ease,filter .22s ease,opacity .22s ease}
.member-art:after{content:"";position:absolute;left:0;right:0;bottom:0;height:46%;background:linear-gradient(180deg,rgba(255,255,255,0) 0,rgba(255,247,244,.18) 28%,rgba(111,72,95,.78) 100%)}
.member-card.react-happy .member-art img{transform:translateY(-6px) scale(1.03);filter:brightness(1.06) saturate(1.04)}
.member-card.react-surprised .member-art img{transform:translateX(6px) scale(1.01);filter:brightness(1.02)}
.member-card.react-troubled .member-art img{transform:translateY(3px) scale(.99);filter:saturate(.94) brightness(.98)}
.member-card.react-win .member-art img{transform:translateY(-10px) scale(1.05);filter:brightness(1.08) saturate(1.05)}
.card-bottom{position:absolute;left:16px;right:16px;bottom:16px;z-index:2}.kana{font-size:34px;font-weight:900;color:#fff;text-shadow:2px 2px 0 rgba(56,31,44,.9),0 3px 12px rgba(0,0,0,.18);margin-bottom:4px}.roman{font-size:14px;letter-spacing:.14em;font-weight:700;color:#fff7fb;text-shadow:1px 1px 0 rgba(56,31,44,.9)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{background:rgba(255,255,255,.85);border:2px solid rgba(244,182,199,.8);border-radius:14px;padding:12px;text-align:center;font-weight:900}.stat b{display:block;font-size:30px;color:#ff7f9f;text-shadow:2px 2px 0 #fff}
.help{font-size:12px;line-height:1.6;color:#8e5f75}
.ctrl{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}.ctrl .wide{grid-column:span 2}
.ctrl button{border:0;border-radius:18px;padding:16px 8px;background:linear-gradient(180deg,#fff7f4,#f6d7e0);color:#8a5871;font-weight:900;font-size:22px;box-shadow:0 8px 18px rgba(145,91,115,.18),inset 0 0 0 3px rgba(255,255,255,.78)}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60;background:rgba(253,247,248,.86);backdrop-filter:blur(5px)}
.overlay.show{display:flex}
.modal{width:min(760px,95vw);background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(253,242,239,.98));border:4px solid var(--line);border-radius:26px;padding:22px;box-shadow:0 20px 48px rgba(137,88,107,.2),inset 0 0 0 3px rgba(255,255,255,.76);text-align:center}
.title-screen .modal,.select-screen .modal{padding:18px}
.title-screen{background:#f7ebe6}
.title-screen .modal{width:min(96vw,1700px);max-height:96vh;padding:0;border:0;background:transparent;box-shadow:none}
.hero-bg{position:relative;border-radius:22px;overflow:hidden;min-height:auto;background:transparent}
.hero-bg img{display:block;width:100%;height:auto;max-height:96vh;object-fit:contain}
.hero-hotspot{position:absolute;left:1.8%;bottom:4%;width:29%;height:23%;cursor:pointer;border-radius:28px;border:0;background:transparent;box-shadow:none;padding:0;appearance:none;-webkit-appearance:none}
.hero-hotspot:hover,.hero-hotspot:active,.hero-hotspot:focus,.hero-hotspot:focus-visible{outline:none;background:transparent;box-shadow:none}
.select-title{display:block;max-width:min(420px,58vw);margin:0 auto 10px}
.select-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.select-card{cursor:pointer;background:linear-gradient(180deg,#fff,#faece8);border:3px solid rgba(246,182,199,.8);border-radius:18px;overflow:hidden;box-shadow:0 10px 22px rgba(145,91,115,.14);transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}.select-card:hover,.select-card:active{transform:translateY(-2px);border-color:#ff84a0;box-shadow:0 14px 30px rgba(145,91,115,.2)}
.select-card img{display:block;width:100%;aspect-ratio:4/5;object-fit:cover;background:#f5e6e4}.select-meta{padding:10px 8px}.select-name{font-weight:900;font-size:18px;color:#8a5a73}.select-roman{font-size:11px;letter-spacing:.14em;color:#b17d95;font-weight:700}
.result-title{font-size:clamp(34px,7vw,60px);font-weight:900;margin:0;color:#ff85a2;text-shadow:0 0 14px rgba(255,255,255,.82),3px 3px 0 #fff}.retry-btn{cursor:pointer;border:0;border-radius:18px;padding:16px 28px;background:linear-gradient(180deg,#fff0a0,#ffd36d);color:#6c4a0e;font-weight:900;font-size:26px;box-shadow:0 12px 28px rgba(177,121,10,.2),inset 0 0 0 3px rgba(255,255,255,.8)}
.chain-fx{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.7);pointer-events:none;opacity:0;font-weight:900;font-size:clamp(34px,5vw,64px);color:#ff7da0;text-shadow:0 0 14px rgba(255,255,255,.92),3px 3px 0 #fff;transition:transform .18s ease,opacity .18s ease;z-index:10}.chain-fx.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
@media (max-width:900px){.grid{grid-template-columns:1fr}.mobile-hide{display:none}.member-card{min-height:320px}.select-title{max-width:min(390px,78vw)}.select-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.hero-hotspot{left:1.5%;bottom:3%;width:33%;height:24%}}
@media (max-width:560px){body{padding:8px 8px calc(14px + var(--safe))}.frame{padding:8px;border-radius:18px}.panel,.box{border-radius:14px}.member-card{min-height:280px}.select-grid{grid-template-columns:1fr 1fr;gap:10px}.hero-bg{min-height:260px}.hero-hotspot{left:1%;bottom:2.4%;width:36%;height:24%}.ctrl button{padding:14px 6px;font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="frame" id="appFrame">
    <div class="grid" id="gameScreen">
      <section class="panel">
        <div class="label"><span>PLAYER</span><span></span></div>
        <div class="board-wrap">
          <canvas id="playerBoard" width="288" height="576"></canvas>
        </div>
        <div class="ctrl">
          <button id="btnLeft">◀</button>
          <button id="btnRight">▶</button>
          <button id="btnRotL">Z↺</button>
          <button id="btnRotR">X↻</button>
          <button class="wide" id="btnSoft">▼落とす</button>
          <button class="wide" id="btnHard">⇊一気に</button>
        </div>
      </section>

      <section class="center">
        <div class="box">
          <div class="title">NEXT</div>
          <div class="next" id="nextBox"></div>
          <div class="legend" id="legendBox"></div>
          <div class="smallnote">グレー肉球はおじゃまです。</div>
        </div>

        <div class="box">
          <div class="member-card" id="memberCard">
            <div class="member-art"><img id="memberImage" alt="ネコ娘"></div>
            <div class="card-bottom"><div class="kana" id="memberKana">ミケ</div><div class="roman" id="memberRoman">MIKE</div></div>
          </div>
        </div>

        <div class="stats">
          <div class="stat">SCORE<b id="score">0</b></div>
          <div class="stat">MAX CHAIN<b id="chain">0</b></div>
        </div>
        <div class="box help">←→ 移動 / ↓ ソフトドロップ / Z・X 回転 / Space ハードドロップ<br>スマホでは盤面スワイプと下のボタンで操作できます。</div>
      </section>

      <section class="panel mobile-hide">
        <div class="label"><span id="cpuNameLabel">ミケ</span><span></span></div>
        <div class="board-wrap">
          <canvas id="cpuBoard" width="288" height="576"></canvas>
        </div>
      </section>
    </div>
  </div>
</div>

<div class="overlay show title-screen" id="titleScreen">
  <div class="modal">
    <div class="hero-bg">
      <img src="assets/title.png" alt="タイトル画面">
      <button type="button" class="hero-hotspot" id="startBtnHotspot" aria-label="はじめるにゃ！"></button>
    </div>
  </div>
</div>

<div class="overlay select-screen" id="selectScreen">
  <div class="modal">
    <img class="select-title" src="assets/select-title.png" alt="誰と遊ぶにゃ？">
    <div class="select-grid" id="selectGrid"></div>
  </div>
</div>

<div class="overlay" id="resultOverlay">
  <div class="modal">
    <h2 class="result-title" id="resultTitle">ざんねん！</h2>
    <button class="retry-btn" id="retryBtn">もう一回遊ぶにゃ！</button>
  </div>
</div>

<audio id="bgmTitle" src="assets/title-bgm.mp3" preload="auto" loop></audio>
<audio id="bgmSelect" src="assets/select-bgm.mp3" preload="auto" loop></audio>
<audio id="bgmPlay" src="assets/play-bgm.mp3" preload="auto" loop></audio>
<audio id="voice1" src="assets/voice-1.mp3" preload="auto"></audio>
<audio id="voice2" src="assets/voice-2.mp3" preload="auto"></audio>
<audio id="voice3" src="assets/voice-3.mp3" preload="auto"></audio>

<script>
(()=>{
const COLS=6, ROWS=12, CELL=48, FALL_MS=700, SOFT_MS=50;
const TYPES=['red','blue','yellow','green','purple'];
const GARBAGE='garbage';
const TOKENS={
  red:{label:'レッド',src:'assets/red.png'},
  blue:{label:'ブルー',src:'assets/blue.png'},
  yellow:{label:'イエロー',src:'assets/yellow.png'},
  green:{label:'グリーン',src:'assets/green.png'},
  purple:{label:'パープル',src:'assets/purple.png'},
  garbage:{label:'おじゃま',src:'assets/gray.png'}
};
const CPU_PROFILES={
  mike:{style:'バランス型',thinkEvery:240,randomness:.08,aggressive:1.05,chainPref:1.1,flatPref:1.15,holePenalty:1.2,heightPenalty:1.1,centerPref:.3,harassPref:.75,panic:1.0},
  chatora:{style:'速攻型',thinkEvery:180,randomness:.12,aggressive:1.35,chainPref:.75,flatPref:.85,holePenalty:1.0,heightPenalty:.85,centerPref:.1,harassPref:1.35,panic:.8},
  shiro:{style:'安定型',thinkEvery:260,randomness:.04,aggressive:.8,chainPref:1.0,flatPref:1.45,holePenalty:1.6,heightPenalty:1.45,centerPref:.25,harassPref:.65,panic:1.2},
  kuro:{style:'いやがらせ型',thinkEvery:210,randomness:.09,aggressive:1.15,chainPref:1.25,flatPref:.9,holePenalty:1.05,heightPenalty:1.0,centerPref:.2,harassPref:1.55,panic:1.0},
  hachiware:{style:'トリッキー型',thinkEvery:200,randomness:.22,aggressive:1.0,chainPref:1.15,flatPref:.8,holePenalty:.95,heightPenalty:.95,centerPref:.8,harassPref:1.0,panic:.9},
  saba:{style:'堅実型',thinkEvery:230,randomness:.06,aggressive:.95,chainPref:.95,flatPref:1.35,holePenalty:1.45,heightPenalty:1.35,centerPref:.15,harassPref:.85,panic:1.1},
  suko:{style:'ゆるふわ型',thinkEvery:310,randomness:.2,aggressive:.7,chainPref:.75,flatPref:.9,holePenalty:.8,heightPenalty:.75,centerPref:.2,harassPref:.6,panic:.7},
  ruu:{style:'ロマン連鎖型',thinkEvery:250,randomness:.12,aggressive:.95,chainPref:1.55,flatPref:.7,holePenalty:.85,heightPenalty:.8,centerPref:.3,harassPref:1.1,panic:.85},
  shamu:{style:'テクニカル型',thinkEvery:170,randomness:.05,aggressive:1.1,chainPref:1.35,flatPref:1.2,holePenalty:1.4,heightPenalty:1.2,centerPref:.35,harassPref:1.15,panic:1.15}
};
const MEMBERS=[
  {id:'mike',kana:'ミケ',roman:'MIKE',pattern:'三毛',img:'images/mike.webp'},
  {id:'chatora',kana:'チャトラ',roman:'CHATORA',pattern:'茶トラ',img:'images/chatora.webp'},
  {id:'shiro',kana:'シロ',roman:'SHIRO',pattern:'白猫',img:'images/shiro.webp'},
  {id:'kuro',kana:'クロ',roman:'KURO',pattern:'黒猫',img:'images/kuro.webp'},
  {id:'hachiware',kana:'ハチワレ',roman:'HACHIWARE',pattern:'ハチワレ',img:'images/hachiware.webp'},
  {id:'saba',kana:'サバ',roman:'SABA',pattern:'サバトラ',img:'images/saba.webp'},
  {id:'suko',kana:'スコ',roman:'SUKO',pattern:'スコティッシュ',img:'images/suko.webp'},
  {id:'ruu',kana:'ルー',roman:'RUU',pattern:'ロシアンブルー',img:'images/ruu.webp'},
  {id:'shamu',kana:'シャム',roman:'SHAMU',pattern:'シャム',img:'images/shamu.webp'}
];
const imgs={}; Object.keys(TOKENS).forEach(k=>{const i=new Image();i.src=TOKENS[k].src;imgs[k]=i;});
MEMBERS.forEach(m=>{const i=new Image();i.src=m.img;});
const els={
 appFrame:document.getElementById('appFrame'),
 playerCanvas:document.getElementById('playerBoard'), cpuCanvas:document.getElementById('cpuBoard'),
 nextBox:document.getElementById('nextBox'), legendBox:document.getElementById('legendBox'),
 score:document.getElementById('score'), chain:document.getElementById('chain'),
 memberCard:document.getElementById('memberCard'), memberImage:document.getElementById('memberImage'), memberKana:document.getElementById('memberKana'), memberRoman:document.getElementById('memberRoman'), cpuNameLabel:document.getElementById('cpuNameLabel'),
 titleScreen:document.getElementById('titleScreen'), selectScreen:document.getElementById('selectScreen'), resultOverlay:document.getElementById('resultOverlay'), resultTitle:document.getElementById('resultTitle'), retryBtn:document.getElementById('retryBtn'), startBtnHotspot:document.getElementById('startBtnHotspot'), selectGrid:document.getElementById('selectGrid'),
 bgmTitle:document.getElementById('bgmTitle'), bgmSelect:document.getElementById('bgmSelect'), bgmPlay:document.getElementById('bgmPlay'),
 voice1:document.getElementById('voice1'), voice2:document.getElementById('voice2'), voice3:document.getElementById('voice3'),
 btnLeft:document.getElementById('btnLeft'), btnRight:document.getElementById('btnRight'), btnRotL:document.getElementById('btnRotL'), btnRotR:document.getElementById('btnRotR'), btnSoft:document.getElementById('btnSoft'), btnHard:document.getElementById('btnHard')
};
const ctxP=els.playerCanvas.getContext('2d');
const ctxC=els.cpuCanvas.getContext('2d');
const chainFx=document.createElement('div');
chainFx.className='chain-fx';
document.getElementById('appFrame').appendChild(chainFx);
let currentMember=MEMBERS[0];
let currentCpuProfile=CPU_PROFILES[currentMember.id];
let expressionTimer=null;
let reactionTimer=null;
const mkBoard=()=>Array.from({length:ROWS},()=>Array(COLS).fill(null));
const st={
  player:{board:mkBoard(),piece:null,next:null,last:0,drop:FALL_MS,maxChain:0,score:0,over:false},
  cpu:{board:mkBoard(),piece:null,next:null,last:0,drop:780,maxChain:0,score:0,over:false,targetX:2,targetRot:0,actionAt:0,thinkEvery:240,moveSteps:[]},
  running:false,
  mode:'title'
};

function randType(){return TYPES[(Math.random()*TYPES.length)|0]}
function randPair(){return [randType(),randType()]}
function clone(obj){return JSON.parse(JSON.stringify(obj))}
function stopAllBgm(){['bgmTitle','bgmSelect','bgmPlay'].forEach(k=>{els[k].pause(); els[k].currentTime=0;});}
function playBgm(name){stopAllBgm(); const a=els[name]; a.volume=0.6; a.play().catch(()=>{});} 
function playVoice(n){const a=n===1?els.voice1:n===2?els.voice2:els.voice3; a.currentTime=0; a.play().catch(()=>{});} 
function expressionPath(memberId, expression){ return `images/expressions/${memberId}_${expression}.png`; }
function clearReactionClasses(){ els.memberCard.classList.remove('react-happy','react-surprised','react-troubled','react-win'); }
function clearTransitionTimers(){ clearTimeout(expressionTimer); clearTimeout(reactionTimer); clearTimeout(endGame.overlayTimer); }
function cpuDangerExpression(){
  const metrics = boardMetrics(st.cpu.board);
  if(st.cpu.over) return 'troubled';
  if(metrics.maxHeight >= 10 || metrics.holes >= 5) return 'troubled';
  return 'normal';
}
function setMemberExpression(expression='normal', holdMs=0, reactionClass=''){
  clearTimeout(expressionTimer);
  clearTimeout(reactionTimer);
  clearReactionClasses();
  els.memberImage.src = expressionPath(currentMember.id, expression);
  if(reactionClass){
    els.memberCard.classList.add(reactionClass);
    reactionTimer = setTimeout(()=>clearReactionClasses(), Math.min(holdMs || 520, 700));
  }
  if(holdMs > 0){
    expressionTimer = setTimeout(()=>{
      clearReactionClasses();
      els.memberImage.src = expressionPath(currentMember.id, cpuDangerExpression());
    }, holdMs);
  }
}
function syncMemberExpression(){
  clearTimeout(expressionTimer);
  clearTimeout(reactionTimer);
  clearReactionClasses();
  els.memberImage.src = expressionPath(currentMember.id, cpuDangerExpression());
} 
function setMember(m){
  currentMember=m;
  currentCpuProfile=CPU_PROFILES[m.id] || CPU_PROFILES.mike;
  els.memberKana.textContent=m.kana;
  els.memberRoman.textContent=m.roman;
  els.cpuNameLabel.textContent=m.kana;
  els.appFrame.style.setProperty('--play-bg', `url("assets/bg-${m.id}.png")`);
  els.memberImage.src = expressionPath(m.id, 'normal');
}
function prepareSelection(member){
  clearTransitionTimers();
  clearReactionClasses();
  setMember(member);
  ['player','cpu'].forEach(side=>{
    st[side].board=mkBoard();
    st[side].piece=null;
    st[side].next=null;
    st[side].last=0;
    st[side].over=false;
  });
  st.player.score=0;
  st.player.maxChain=0;
  st.cpu.score=0;
  st.cpu.maxChain=0;
  els.score.textContent='0';
  els.chain.textContent='0';
  renderNext();
  drawBoard(ctxP,st.player);
  drawBoard(ctxC,st.cpu);
  syncMemberExpression();
}
function buildSelect(){
  els.selectGrid.innerHTML='';
  MEMBERS.forEach(m=>{
    const d=document.createElement('div');
    d.className='select-card';
    d.innerHTML=`<img src="${m.img}" alt="${m.kana}"><div class="select-meta"><div class="select-name">${m.kana}</div><div class="select-roman">${m.roman}</div></div>`;
    d.onclick=()=>{
      prepareSelection(m);
      requestAnimationFrame(()=>requestAnimationFrame(startGame));
    };
    els.selectGrid.appendChild(d);
  });
}
function renderLegend(){
  els.legendBox.innerHTML='';
  ['red','blue','yellow','green','purple','garbage'].forEach(k=>{
    const div=document.createElement('div');
    div.className='legend-item';
    div.innerHTML=`<img class="legend-icon" src="${TOKENS[k].src}" alt="${TOKENS[k].label}"><div>${TOKENS[k].label}</div>`;
    els.legendBox.appendChild(div);
  });
}
function renderNext(){
  els.nextBox.innerHTML='';
  const pair=st.player.next||randPair();
  const wrap=document.createElement('div');
  wrap.className='pair';
  pair.forEach(t=>{
    const im=document.createElement('img');
    im.className='token-img';
    im.src=TOKENS[t].src;
    im.alt=TOKENS[t].label;
    wrap.appendChild(im);
  });
  els.nextBox.appendChild(wrap);
}
function spawn(side){
  const S=st[side];
  const pair=S.next||randPair();
  S.next=randPair();
  if(side==='player') renderNext();
  S.piece={x:2,y:1,rot:0,a:pair[0],b:pair[1]};
  if(collide(S.board,S.piece)) S.over=true;
  if(side==='cpu' && !S.over) planCpu();
}
function cells(p){
  const arr=[{x:p.x,y:p.y,t:p.a}];
  const off=[{x:0,y:-1},{x:1,y:0},{x:0,y:1},{x:-1,y:0}][p.rot];
  arr.push({x:p.x+off.x,y:p.y+off.y,t:p.b});
  return arr;
}
function collide(board,p){
  for(const c of cells(p)){
    if(c.x<0 || c.x>=COLS || c.y>=ROWS) return true;
    if(c.y>=0 && board[c.y][c.x]) return true;
  }
  return false;
}
function move(side,dx,dy){
  const S=st[side];
  if(!S.piece) return false;
  const np=clone(S.piece);
  np.x+=dx; np.y+=dy;
  if(!collide(S.board,np)){S.piece=np; return true;}
  return false;
}
function rotate(side,dir){
  const S=st[side];
  if(!S.piece) return false;
  const np=clone(S.piece);
  np.rot=(np.rot+dir+4)%4;
  if(!collide(S.board,np)){S.piece=np; return true;}
  const kicks=[[1,0],[-1,0],[0,-1],[0,1],[2,0],[-2,0]];
  for(const [kx,ky] of kicks){
    const kp=clone(np);
    kp.x+=kx; kp.y+=ky;
    if(!collide(S.board,kp)){S.piece=kp; return true;}
  }
  return false;
}
function hardDrop(side){
  while(move(side,0,1));
  lock(side);
}
function applyGravity(board){
  let moved=false;
  for(let x=0;x<COLS;x++){
    let write=ROWS-1;
    for(let y=ROWS-1;y>=0;y--){
      if(board[y][x]){
        if(y!==write){board[write][x]=board[y][x]; board[y][x]=null; moved=true;}
        write--;
      }
    }
    for(let y=write;y>=0;y--) board[y][x]=null;
  }
  return moved;
}
function findGroups(board){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const groups=[];
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const t=board[y][x];
    if(!t || t===GARBAGE || seen[y][x]) continue;
    const stack=[[x,y]], g=[];
    seen[y][x]=true;
    while(stack.length){
      const [cx,cy]=stack.pop();
      g.push([cx,cy]);
      for(const[dX,dY] of dirs){
        const nx=cx+dX, ny=cy+dY;
        if(nx<0||nx>=COLS||ny<0||ny>=ROWS||seen[ny][nx]) continue;
        if(board[ny][nx]===t){seen[ny][nx]=true; stack.push([nx,ny]);}
      }
    }
    if(g.length>=4) groups.push(g);
  }
  return groups;
}
function addGarbage(board,n){
  for(let i=0;i<n;i++){
    const cols=[];
    for(let x=0;x<COLS;x++) if(!board[0][x]) cols.push(x);
    if(!cols.length) break;
    const x=cols[(Math.random()*cols.length)|0];
    for(let y=ROWS-1;y>=0;y--){
      if(!board[y][x]){board[y][x]=GARBAGE; break;}
    }
  }
}
function showChain(n){
  chainFx.textContent=`${n}れんさ！`;
  chainFx.classList.add('show');
  clearTimeout(showChain.t);
  showChain.t=setTimeout(()=>chainFx.classList.remove('show'),560);
}
function clearStep(side){
  const S=st[side];
  let chain=0,total=0;
  while(true){
    applyGravity(S.board);
    const groups=findGroups(S.board);
    if(!groups.length) break;
    chain++;
    let cleared=0;
    const aroundGarbage=[];
    groups.forEach(g=>{
      g.forEach(([x,y])=>{
        S.board[y][x]=null;
        cleared++;
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
          const nx=x+dx, ny=y+dy;
          if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&S.board[ny][nx]===GARBAGE) aroundGarbage.push([nx,ny]);
        });
      });
    });
    aroundGarbage.forEach(([x,y])=>{S.board[y][x]=null;});
    total+=cleared;
    S.score += cleared * (chain===1?10:20*chain);
    S.maxChain=Math.max(S.maxChain,chain);
    if(side==='player'){
      els.score.textContent=S.score;
      els.chain.textContent=S.maxChain;
      playVoice(chain>=3?3:chain);
      showChain(chain);
    }
  }
  if(chain>=2){
    const garbageCount=Math.min(6,chain+1);
    addGarbage(st[side==='player'?'cpu':'player'].board,garbageCount);
  }
  if(chain>0){
    if(side==='player'){
      setMemberExpression(chain>=2?'troubled':'surprised', chain>=2?920:620, chain>=2?'react-troubled':'react-surprised');
    } else {
      setMemberExpression(chain>=3?'win':'happy', chain>=3?900:700, chain>=3?'react-win':'react-happy');
    }
  } else {
    syncMemberExpression();
  }
  return {chain,total};
}
function lock(side){
  const S=st[side];
  for(const c of cells(S.piece)){
    if(c.y>=0&&c.y<ROWS&&c.x>=0&&c.x<COLS) S.board[c.y][c.x]=c.t;
  }
  S.piece=null;
  clearStep(side);
  spawn(side);
  checkEnd();
}
function checkEnd(){
  if(st.player.over) endGame(false);
  else if(st.cpu.over) endGame(true);
}
function endGame(win){
  st.running=false;
  els.resultTitle.textContent=win?'やったね！':'ざんねん！';
  setMemberExpression(win ? 'troubled' : 'win', 0, win ? 'react-troubled' : 'react-win');
  playBgm('bgmSelect');
  clearTimeout(endGame.overlayTimer);
  endGame.overlayTimer=setTimeout(()=>{
    els.resultOverlay.classList.add('show');
  }, 1200);
}
function startGame(){
  clearTransitionTimers();
  els.titleScreen.classList.remove('show');
  els.selectScreen.classList.remove('show');
  els.resultOverlay.classList.remove('show');
  st.running=true;
  st.mode='play';
  ['player','cpu'].forEach(side=>{
    st[side].board=mkBoard();
    st[side].piece=null;
    st[side].next=randPair();
    st[side].last=0;
    st[side].over=false;
    st[side].maxChain=0;
    st[side].score=0;
  });
  st.cpu.drop=Math.max(620, 820 - Math.round((1.15-currentCpuProfile.aggressive)*120));
  st.cpu.thinkEvery=currentCpuProfile.thinkEvery;
  st.cpu.moveSteps=[];
  els.score.textContent='0';
  els.chain.textContent='0';
  spawn('player');
  spawn('cpu');
  syncMemberExpression();
  playBgm('bgmPlay');
}
function showTitle(){
  clearTransitionTimers();
  st.running=false;
  st.mode='title';
  els.titleScreen.classList.add('show');
  els.selectScreen.classList.remove('show');
  els.resultOverlay.classList.remove('show');
  playBgm('bgmTitle');
}
function showSelect(){
  clearTransitionTimers();
  st.running=false;
  st.mode='select';
  els.titleScreen.classList.remove('show');
  els.selectScreen.classList.add('show');
  els.resultOverlay.classList.remove('show');
  playBgm('bgmSelect');
}
function drawBoard(ctx,S){
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const px=x*CELL, py=y*CELL;
    ctx.fillStyle=(x+y)%2===0?'rgba(255,255,255,.28)':'rgba(255,246,243,.45)';
    ctx.fillRect(px,py,CELL,CELL);
    ctx.strokeStyle='rgba(214,111,142,.18)';
    ctx.strokeRect(px,py,CELL,CELL);
    const t=S.board[y][x];
    if(t) drawToken(ctx,t,px+3,py+3,CELL-6,CELL-6);
  }
  if(S.piece){
    cells(S.piece).forEach(c=>{if(c.y>=0) drawToken(ctx,c.t,c.x*CELL+3,c.y*CELL+3,CELL-6,CELL-6);});
  }
}
function drawToken(ctx,type,x,y,w,h){
  const img=imgs[type===GARBAGE?'garbage':type];
  if(img && img.complete) ctx.drawImage(img,x,y,w,h);
  else {ctx.fillStyle='#ddd';ctx.fillRect(x,y,w,h);}
}
function boardMetrics(board){
  const heights=Array(COLS).fill(0);
  let holes=0, garbage=0;
  for(let x=0;x<COLS;x++){
    let seen=false;
    for(let y=0;y<ROWS;y++){
      if(board[y][x]){
        if(!seen){heights[x]=ROWS-y; seen=true;}
        if(board[y][x]===GARBAGE) garbage++;
      }else if(seen){
        holes++;
      }
    }
  }
  let bumpiness=0;
  for(let x=0;x<COLS-1;x++) bumpiness+=Math.abs(heights[x]-heights[x+1]);
  const maxHeight=Math.max(...heights);
  const avgHeight=heights.reduce((a,b)=>a+b,0)/COLS;
  const centerBias = heights.reduce((sum,h,i)=>sum + Math.abs(i-2.5)*h,0);
  return {heights,holes,garbage,bumpiness,maxHeight,avgHeight,centerBias};
}
function immediatePotential(board){
  const groups=findGroups(board);
  let adj=0;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const t=board[y][x];
    if(!t||t===GARBAGE) continue;
    [[1,0],[0,1]].forEach(([dx,dy])=>{
      const nx=x+dx, ny=y+dy;
      if(nx<COLS&&ny<ROWS&&board[ny][nx]===t) adj++;
    });
  }
  return {groups:groups.length,adj};
}
function simulateClear(board){
  const tmp=board.map(r=>r.slice());
  let chain=0,total=0;
  while(true){
    applyGravity(tmp);
    const groups=findGroups(tmp);
    if(!groups.length) break;
    chain++;
    const around=[];
    groups.forEach(g=>{
      g.forEach(([x,y])=>{
        tmp[y][x]=null; total++;
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
          const nx=x+dx, ny=y+dy;
          if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&tmp[ny][nx]===GARBAGE) around.push([nx,ny]);
        });
      });
    });
    around.forEach(([x,y])=>tmp[y][x]=null);
  }
  applyGravity(tmp);
  return {board:tmp,chain,total};
}
function simulatePlacement(board,pair,x,rot){
  const piece={x,y:1,rot,a:pair[0],b:pair[1]};
  if(collide(board,piece)) return null;
  const falling=clone(piece);
  while(!collide(board,{...falling,y:falling.y+1})) falling.y++;
  const tmp=board.map(r=>r.slice());
  for(const c of cells(falling)){
    if(c.y<0||c.y>=ROWS||c.x<0||c.x>=COLS) return null;
    tmp[c.y][c.x]=c.t;
  }
  return simulateClear(tmp);
}
function scorePlacement(result, profile){
  const metrics=boardMetrics(result.board);
  const pot=immediatePotential(result.board);
  const attack=(result.chain>=2 ? (result.chain+1) : 0);
  const safeHeightPenalty = metrics.maxHeight>9 ? (metrics.maxHeight-9)*6*profile.panic : 0;
  return (
    result.total * 20 * profile.aggressive +
    result.chain * 65 * profile.chainPref +
    attack * 45 * profile.harassPref +
    pot.adj * 4 * profile.chainPref +
    pot.groups * 25 * profile.aggressive -
    metrics.holes * 18 * profile.holePenalty -
    metrics.bumpiness * 4.5 * profile.flatPref -
    metrics.maxHeight * 7 * profile.heightPenalty -
    metrics.avgHeight * 3.5 * profile.heightPenalty -
    metrics.centerBias * 0.5 * profile.centerPref -
    safeHeightPenalty +
    (Math.random() - 0.5) * 30 * profile.randomness
  );
}
function findCpuPlan(profile){
  const pair=[st.cpu.piece.a, st.cpu.piece.b];
  const candidates=[];
  for(let rot=0; rot<4; rot++){
    for(let x=-1; x<COLS+1; x++){
      const sim=simulatePlacement(st.cpu.board,pair,x,rot);
      if(!sim) continue;
      candidates.push({x,rot,score:scorePlacement(sim,profile),chain:sim.chain,total:sim.total});
    }
  }
  if(!candidates.length) return {x:2,rot:0};
  candidates.sort((a,b)=>b.score-a.score);
  const chooseIndex = Math.random() < profile.randomness*0.9 ? Math.min(candidates.length-1, 1 + ((Math.random()*Math.min(3,candidates.length-1))|0)) : 0;
  return candidates[chooseIndex];
}
function buildMoveSteps(fromRot, toRot, fromX, toX){
  const steps=[];
  let rot=fromRot;
  while(rot!==toRot){ steps.push('rotR'); rot=(rot+1)%4; if(steps.length>4) break; }
  while(fromX<toX){ steps.push('right'); fromX++; }
  while(fromX>toX){ steps.push('left'); fromX--; }
  steps.push(Math.random()<0.65?'hard':'soft');
  return steps;
}
function planCpu(){
  if(!st.cpu.piece) return;
  const plan=findCpuPlan(currentCpuProfile);
  st.cpu.targetX=plan.x;
  st.cpu.targetRot=plan.rot;
  st.cpu.moveSteps=buildMoveSteps(st.cpu.piece.rot, plan.rot, st.cpu.piece.x, plan.x);
  st.cpu.actionAt=performance.now()+currentCpuProfile.thinkEvery;
}
function stepCpu(now){
  const C=st.cpu;
  if(!C.piece || now < C.actionAt) return;
  if(!C.moveSteps.length){
    planCpu();
    C.actionAt = now + currentCpuProfile.thinkEvery;
    return;
  }
  const action=C.moveSteps.shift();
  let ok=true;
  if(action==='left') ok=move('cpu',-1,0);
  else if(action==='right') ok=move('cpu',1,0);
  else if(action==='rotR') ok=rotate('cpu',1);
  else if(action==='soft') ok=move('cpu',0,1) || (lock('cpu'), true);
  else if(action==='hard'){ hardDrop('cpu'); ok=true; }
  if(!ok){
    planCpu();
  }
  C.actionAt=now+currentCpuProfile.thinkEvery + (Math.random()*55|0);
}
function loop(now){
  requestAnimationFrame(loop);
  if(st.running){
    ['player','cpu'].forEach(side=>{
      const S=st[side];
      if(!S.piece || S.over) return;
      if(now-S.last > S.drop){
        if(!move(side,0,1)) lock(side);
        S.last=now;
      }
    });
    stepCpu(now);
  }
  drawBoard(ctxP,st.player);
  drawBoard(ctxC,st.cpu);
}
window.addEventListener('keydown',e=>{
  if(!st.running) return;
  if(e.key==='ArrowLeft') move('player',-1,0);
  else if(e.key==='ArrowRight') move('player',1,0);
  else if(e.key==='ArrowDown') st.player.drop=SOFT_MS;
  else if(e.key==='z'||e.key==='Z') rotate('player',-1);
  else if(e.key==='x'||e.key==='X'||e.key==='ArrowUp') rotate('player',1);
  else if(e.key===' ') hardDrop('player');
});
window.addEventListener('keyup',e=>{ if(e.key==='ArrowDown') st.player.drop=FALL_MS;});
[['btnLeft',()=>move('player',-1,0)],['btnRight',()=>move('player',1,0)],['btnRotL',()=>rotate('player',-1)],['btnRotR',()=>rotate('player',1)],['btnSoft',()=>{st.player.drop=SOFT_MS; setTimeout(()=>st.player.drop=FALL_MS,180);} ],['btnHard',()=>hardDrop('player')]].forEach(([id,fn])=>els[id].onclick=fn);
let touch=null;
els.playerCanvas.addEventListener('touchstart',e=>{const t=e.touches[0]; touch={x:t.clientX,y:t.clientY};},{passive:true});
els.playerCanvas.addEventListener('touchend',e=>{
  if(!touch||!st.running) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touch.x, dy=t.clientY-touch.y;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20) move('player', dx>0?1:-1,0);
  else if(dy>22){ st.player.drop=SOFT_MS; setTimeout(()=>st.player.drop=FALL_MS,180); }
  else rotate('player',1);
  touch=null;
},{passive:true});
els.startBtnHotspot.onclick=()=>showSelect();
els.retryBtn.onclick=()=>showSelect();
renderLegend();
buildSelect();
renderNext();
setMember(currentMember);
showTitle();
requestAnimationFrame(loop);
})();
</script>
